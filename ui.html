<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BLUE - Brain Linked Utility Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .ui {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .title {
      font-size: 13px;
      letter-spacing: 8px;
      color: #1a6aff44;
      text-transform: uppercase;
      margin-bottom: 260px;
    }

    .status {
      margin-top: 260px;
      font-size: 13px;
      letter-spacing: 4px;
      color: #1a6aff99;
      text-transform: uppercase;
      animation: blink 2s infinite;
    }

    .response-box {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      max-width: 90vw;
      background: rgba(0, 20, 80, 0.4);
      border: 1px solid #1a6aff33;
      border-radius: 16px;
      padding: 20px 28px;
      color: #a0c4ff;
      font-size: 15px;
      line-height: 1.6;
      text-align: center;
      backdrop-filter: blur(10px);
      display: none;
      pointer-events: none;
    }

    .input-area {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      pointer-events: all;
      width: 600px;
      max-width: 90vw;
    }

    .input-area input {
      flex: 1;
      padding: 14px 20px;
      background: rgba(0, 20, 80, 0.5);
      border: 1px solid #1a6aff55;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      outline: none;
      backdrop-filter: blur(10px);
    }

    .input-area input::placeholder {
      color: #1a6aff66;
    }

    .input-area button {
      padding: 14px 24px;
      background: #1a6aff;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #3a8aff;
    }

    .name-tag {
      position: fixed;
      top: 30px;
      right: 30px;
      color: #1a6aff66;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui">
  <div class="title">Brain-Linked Utility Engine</div>
  <div class="status" id="status">Standing By</div>
</div>

<div class="name-tag">BOSS</div>

<div id="startScreen" style="
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #000;
">
  <div style="font-size: 14px; letter-spacing: 8px; color: #1a6aff66; margin-bottom: 40px;">
    BRAIN-LINKED UTILITY ENGINE
  </div>
  <div style="font-size: 60px; font-weight: bold; color: #1a6aff; margin-bottom: 40px;">
    BLUE
  </div>
  <button onclick="startBlue()" style="
    padding: 16px 48px;
    background: transparent;
    border: 1px solid #1a6aff;
    color: #1a6aff;
    font-size: 13px;
    letter-spacing: 6px;
    cursor: pointer;
    text-transform: uppercase;
    border-radius: 4px;
  ">
    INITIALIZE
  </button>
</div>

<div class="response-box" id="responseBox"></div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Ask Blue anything, Boss..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">

</script>
<script>
  // Three.js Scene
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  camera.position.z = 5;

  // Core orb
  const orbGeo = new THREE.SphereGeometry(1.2, 64, 64);
  const orbMat = new THREE.MeshPhongMaterial({
    color: 0x0044ff,
    emissive: 0x001aff,
    transparent: true,
    opacity: 0.15,
    wireframe: false
  });
  const orb = new THREE.Mesh(orbGeo, orbMat);
  scene.add(orb);

  // Wireframe orb
  const wireGeo = new THREE.SphereGeometry(1.21, 32, 32);
  const wireMat = new THREE.MeshBasicMaterial({
    color: 0x1a6aff,
    wireframe: true,
    transparent: true,
    opacity: 0.15
  });
  const wire = new THREE.Mesh(wireGeo, wireMat);
  scene.add(wire);

  // Outer glow ring
  const ringGeo = new THREE.TorusGeometry(1.6, 0.008, 16, 100);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x1a6aff, transparent: true, opacity: 0.4 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  scene.add(ring);

  // Second ring
  const ring2Geo = new THREE.TorusGeometry(1.9, 0.004, 16, 100);
  const ring2Mat = new THREE.MeshBasicMaterial({ color: 0x0044ff, transparent: true, opacity: 0.2 });
  const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
  ring2.rotation.x = Math.PI / 3;
  scene.add(ring2);

  // Particles
  const particleCount = 800;
  const particleGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 20;
  }
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({ color: 0x1a6aff, size: 0.03, transparent: true, opacity: 0.5 });
  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0x001aff, 0.5);
  scene.add(ambientLight);
  const pointLight = new THREE.PointLight(0x1a6aff, 2, 10);
  pointLight.position.set(0, 0, 3);
  scene.add(pointLight);

  // State
  let isSpeaking = false;
  let clock = new THREE.Clock();

  // Animation
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Idle pulse
    const pulse = isSpeaking
      ? 1 + Math.sin(t * 8) * 0.08
      : 1 + Math.sin(t * 1.5) * 0.03;

    orb.scale.set(pulse, pulse, pulse);
    wire.scale.set(pulse, pulse, pulse);

    orb.rotation.y += 0.003;
    wire.rotation.y -= 0.002;
    wire.rotation.x += 0.001;

    ring.rotation.z += 0.005;
    ring2.rotation.z -= 0.003;
    ring2.rotation.y += 0.002;

    particles.rotation.y += 0.0003;

    // Glow when speaking
    orbMat.opacity = isSpeaking ? 0.25 + Math.sin(t * 8) * 0.1 : 0.15;
    ringMat.opacity = isSpeaking ? 0.7 : 0.4;

    renderer.render(scene, camera);
  }
  animate();

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Groq API
  const GROQ_API_KEY = "your_groq_api_key_here";
  let conversationHistory = [];

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const userText = input.value.trim();
    if (!userText) return;

    input.value = '';
    setStatus("Thinking...");
    isSpeaking = false;

    // Handle WhatsApp FIRST
    if (userText.toLowerCase().includes("whatsapp") && userText.toLowerCase().includes("send")) {
      const contact = prompt("Who should I message, Boss?");
      const message = prompt("What's the message, Boss?");
      if (contact && message) {
        showResponse(`Message sent to ${contact}, Boss!`);
        speakResponse(`Message sent to ${contact}, Boss!`);
      }
      setStatus("Standing By");
      return;
    }

    // Handle system commands in UI
    const websites = {
      "youtube": "https://www.youtube.com",
      "google": "https://www.google.com",
      "gmail": "https://www.gmail.com",
      "github": "https://www.github.com",
      "instagram": "https://www.instagram.com",
      "twitter": "https://www.twitter.com",
      "linkedin": "https://www.linkedin.com",
      "netflix": "https://www.netflix.com",
      "spotify": "https://www.spotify.com",
    };

    for (const [site, url] of Object.entries(websites)) {
      if (userText.toLowerCase().includes(site)) {
        window.open(url, '_blank');
        showResponse(`Opening ${site} for you, Boss!`);
        speakResponse(`Opening ${site} for you, Boss!`);
        setStatus("Standing By");
        return;
      }
    }

    // Handle search
    if (userText.toLowerCase().includes("search") || userText.toLowerCase().includes("look up")) {
      const query = userText.toLowerCase().replace("search", "").replace("look up", "").trim();
      window.open(`https://www.google.com/search?q=${query}`, '_blank');
      showResponse(`Searching for ${query}, Boss!`);
      speakResponse(`Searching for ${query}, Boss!`);
      setStatus("Standing By");
      return;
    }

    conversationHistory.push({ role: "user", content: userText });

    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          {
            role: "system",
            content: `You are Blue, a smart and witty AI assistant. Always call the user 'Boss'. Keep responses short and conversational.`
          },
          ...conversationHistory
        ],
        max_tokens: 150
      })
    });

    const data = await response.json();
    const reply = data.choices[0].message.content;
    conversationHistory.push({ role: "assistant", content: reply });

    showResponse(reply);
    speakResponse(reply);
  }
  function showResponse(text) {
    const box = document.getElementById('responseBox');
    box.style.display = 'block';
    box.textContent = text;
  }

  function setStatus(text) {
    document.getElementById('status').textContent = text;
  }

  function speakResponse(text) {
    isSpeaking = true;
    setStatus("Speaking...");
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 1;
    utterance.pitch = 1;

    // Pick voice
    const voices = speechSynthesis.getVoices();
    const femaleVoice = voices.find(v => v.name.includes("Female") || v.name.includes("Zira") || v.name.includes("Hazel"));
    if (femaleVoice) utterance.voice = femaleVoice;

    utterance.onend = () => {
      isSpeaking = false;
      setStatus("Standing By");
    };

    speechSynthesis.speak(utterance);
  }

  // Enter key
  document.getElementById('userInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // Load voices
  // Load voices and play intro
 // Load voices
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

  function startBlue() {
    document.getElementById('startScreen').style.display = 'none';
    setTimeout(() => {
      speakResponse("Hello Boss! I'm Blue, your personal AI assistant. How can I help you today?");
      showResponse("Hello Boss! I'm Blue, your personal AI assistant. How can I help you today?");
    }, 500);
  }

  // Intro message when page loads
  // Intro message when page loads
  function playIntro() {
    const voices = speechSynthesis.getVoices();
    if (voices.length === 0) {
      setTimeout(playIntro, 200);
      return;
    }
    setTimeout(() => {
      speakResponse("Hello Boss! I'm Blue, your personal AI assistant. How can I help you today?");
      showResponse("Hello Boss! I'm Blue, your personal AI assistant. How can I help you today?");
    }, 500);
  }

  speechSynthesis.onvoiceschanged = () => playIntro();
  playIntro();
</script>
</body>
</html>
